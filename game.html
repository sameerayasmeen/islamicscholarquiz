        :root {
            --emerald-deep: #022c22;
            --gold-accent: #D4AF37;
            --gold-soft: #fcf1d1;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(212, 175, 55, 0.3);

        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, #064e3b 0%, #022c22 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
            margin: 0;

        h1, h2, h3, .font-cinzel { font-family: 'Cinzel', serif; }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        .btn-gold {
            background: linear-gradient(135deg, #D4AF37 0%, #b8860b 100%);
            color: #022c22;
            font-weight: 700;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-gold:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(212, 175, 55, 0.6);
            filter: brightness(1.1);
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease forwards;
            min-height: 100vh;
            width: 100%;
            padding: 1.5rem;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.98); }
            to { opacity: 1; transform: scale(1); }
        }

        .active-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .status-light {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: white;
            box-shadow: 0 0 10px white;
            transition: all 0.4s ease;
            margin-right: 8px;
        }
        .light-thinking { background: white; box-shadow: 0 0 15px white; animation: pulse-white 2s infinite; }
        .light-correct { background: #10b981; box-shadow: 0 0 20px #10b981; animation: pulse-green 0.5s infinite; }
        .light-wrong { background: #ef4444; box-shadow: 0 0 20px #ef4444; animation: pulse-red-light 0.5s infinite; }

        @keyframes pulse-white { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes pulse-green { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }
        @keyframes pulse-red-light { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3); } }

        .timer-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .timer-critical {
            border-color: #ef4444 !important;
            animation: pulse-red-bar 0.8s infinite;
        }

        @keyframes pulse-red-bar { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.01); } }

        #timer-bar {
            height: 100%;
            background: var(--gold-accent);
            width: 100%;
            transition: width 1s linear, background 0.3s ease;
        }

        .letter-blank {
            border-bottom: 3px solid var(--gold-accent);
            min-width: 30px;
            display: inline-block;
            margin: 0 4px;
            text-align: center;
            height: 48px;
            line-height: 48px;
        }

        .correct-choice { background: #10b981 !important; border-color: #34d399 !important; color: white !important; }
        .wrong-choice { background: #ef4444 !important; border-color: #f87171 !important; color: white !important; }

        .key-btn {
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .key-btn:disabled { opacity: 0.2; cursor: not-allowed; transform: scale(0.9); }

        .scramble-slot {
            width: 50px;
            height: 60px;
            border-bottom: 4px solid rgba(212, 175, 55, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 700;
            font-family: 'Cinzel', serif;
            color: var(--gold-accent);
            transition: all 0.2s;
        }
        .scramble-slot.filled { border-color: var(--gold-accent); }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -50px;
            z-index: 9999;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(720deg); }
        }

        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--gold-accent);
            background: rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0 auto 1.5rem;
            position: relative;
        }

        .leaderboard-avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 2px solid var(--gold-accent);

        #visual-element {

            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 1.2em;
            font-family: inherit;
            line-height: 1;
        }

            { q: "Guess the Parable (Surah Al-Kahf):", v: renderEmoji("⛵🧱🧒"), a: ["The Sleepers", "The Two Gardens", "Musa & Khidr", "Dhul-Qarnayn"], c: 2 },
            { q: "Guess the Parable (Surah Al-Kahf):", v: renderEmoji("👑🧱🛡️"), a: ["The Sleepers", "The Two Gardens", "Musa & Khidr", "Dhul-Qarnayn"], c: 3 },
            { q: "Guess the Islamic Figure:", v: renderEmoji("👑🦹‍♂️🌊"), a: ["Firaun (Pharaoh)", "Qarun", "Haman", "Jalut"], c: 0 },
            { q: "Guess the Islamic Figure:", v: renderEmoji("💰📉🕳️"), a: ["Firaun", "Qarun (Korah)", "Haman", "Jalut"], c: 1 },
            { q: "Guess the Islamic Figure:", v: renderEmoji("🏗️🧱🦹‍♂️"), a: ["Firaun", "Qarun", "Haman", "Jalut"], c: 2 },
            { q: "Guess the Islamic Figure:", v: renderEmoji("⚔️🪨👦"), a: ["Firaun", "Qarun", "Haman", "Jalut (Goliath)"], c: 3 },
            { q: "Guess the Surah from this sequence:", v: renderEmoji("⛰️🗣️💥"), a: ["Taha", "Al-A'raf", "Al-Hashr", "Al-Waqi'ah"], c: 2 },
            { q: "Guess the Surah from this sequence:", v: renderEmoji("🌳🔥🗣️"), a: ["Taha", "Al-Qasas", "An-Naml", "All of the above"], c: 3 },
            { q: "Guess the Concept from this sequence:", v: renderEmoji("🎺💥🌍"), a: ["Barzakh", "Qiyamah", "Jannah", "Jahanam"], c: 1 }
        ];

        for(let i = round4Pool.length; i < 100; i++) {
            let base = round4Pool[i % round4Pool.length];
            round4Pool.push({
                q: base.q,
                v: base.v,
                a: [...base.a].reverse(),
                c: base.a.length - 1 - base.c
            });
        }

        // --- AUTH & SUPABASE LOGIC ---
        async function handleAuth() {
            try {
                loadLocalProfile();
                syncProfileUI();

                let user = null;
                const { data: sessionData, error: sessionError } = await supabaseClient.auth.getSession();
                if (sessionError) throw sessionError;

                user = sessionData?.session?.user || null;

                if (!user) {
                    const { data, error } = await supabaseClient.auth.signInAnonymously();

                    if (error) {
                        if (error.message.includes("disabled")) {
                            console.warn("SUPABASE: Anonymous sign-ins are disabled. Please enable them in Authentication > Settings > Auth Providers.");
                            document.getElementById('cloud-status').classList.remove('hidden');
                            isCloudEnabled = false;
                        } else {
                            throw error;
                        }
                    } else {
                        isCloudEnabled = true;
                        user = data?.user || null;
                    }
                } else {
                    isCloudEnabled = true;
                }

                if (user) {
                    userProfile.id = user.id;
                    persistLocalProfile();

                    const { data: profile, error: profileError } = await supabaseClient
                        .from('profiles')
                        .select('*')
                        .eq('id', userProfile.id)
                        .maybeSingle();

                    if (profileError) {
                        console.warn("Profile fetch error:", profileError);
                    }

                    if (profile) {
                        userProfile.name = profile.username || userProfile.name;
                        userProfile.photo = profile.avatar_url || userProfile.photo;
                        persistLocalProfile();
                        syncProfileUI();
                    }
                }
                
                isAuthReady = true;
                document.getElementById('begin-quest-btn').disabled = false;
            } catch (err) { 
                console.error("Auth initialization error:", err);
                isAuthReady = true; // Still allow game play
                document.getElementById('begin-quest-btn').disabled = false;
            }
        }

        function syncProfileUI() {
            const input = document.getElementById('profile-name-input');
            if(input) input.value = userProfile.name;
            if(userProfile.photo) {
                const portrait = document.getElementById('user-portrait');
                portrait.src = userProfile.photo;
                portrait.classList.remove('hidden');
                document.getElementById('default-avatar-icon').classList.add('hidden');
            }
        }

        function handlePhotoUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                userProfile.photo = e.target.result;
                persistLocalProfile();
                const portrait = document.getElementById('user-portrait');
                portrait.src = userProfile.photo;
                portrait.classList.remove('hidden');
                document.getElementById('default-avatar-icon').classList.add('hidden');
                playSFX(sfx.click);
            };
            reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const val = document.getElementById('profile-name-input').value.trim();
            if (val) userProfile.name = val;
            persistLocalProfile();
            
            const btn = document.getElementById('save-profile-btn');
            btn.innerText = "Syncing...";
            btn.disabled = true;

            if (isCloudEnabled && userProfile.id) {
                const { error } = await supabaseClient.from('profiles').upsert({
                    id: userProfile.id,
                    username: userProfile.name,
                    avatar_url: userProfile.photo
                });
                if (error) console.error("Profile save error:", error);
            }

            btn.innerText = "Confirm Changes";
            btn.disabled = false;
            playSFX(sfx.click);
            showScreen('start-screen');
        }

        async function submitScore() {
            playSFX(sfx.click);
            const name = document.getElementById('player-name-final').value.trim() || userProfile.name;
            const btn = document.getElementById('claim-rank-btn');
            btn.innerText = "Recording...";
            btn.disabled = true;

            if (isCloudEnabled) {
                const { data: { user } } = await supabaseClient.auth.getUser();
                const uid = user ? user.id : userProfile.id;

                const { error } = await supabaseClient.from('leaderboard').insert({
                    user_id: uid,
                    username: name,
                    score: gameState.score,
                    avatar_url: userProfile.photo
                });

                if (error) console.error("Score submission error:", error);
            }

            showLeaderboard();
            btn.innerText = "Register in the Hall";
            btn.disabled = false;
        }

        async function showLeaderboard() {
            const list = document.getElementById('leaderboard-list'); 
            if(!list) return;
            list.innerHTML = '<div class="text-center py-10 opacity-50">Consulting Hall archives...</div>';
            showScreen('leaderboard-screen');
            
            if (!isCloudEnabled) {
                list.innerHTML = '<div class="text-center py-10 opacity-50">Cloud Sync is disabled. Visit Supabase settings to enable Hall of Scholars.</div>';
                return;
            }

            const { data, error } = await supabaseClient
                .from('leaderboard')
                .select('*')
                .order('score', { ascending: false })
                .limit(5);

            if (error) {
                console.error("Leaderboard fetch error:", error);
                list.innerHTML = `<div class="text-center py-10 text-red-400 font-cinzel">Connection to Hall failed.</div>`;
                return;
            }

            list.innerHTML = '';
            if (data && data.length > 0) {
                data.forEach((e, i) => {
                    const item = document.createElement('div');
                    item.className = "flex justify-between items-center glass-card p-5 animate-fadeIn";
                    const medals = ["🥇","🥈","🥉","⭐","⭐"];
                    const medalIcon = medals[i] || "⭐";
                    const avatarHTML = e.avatar_url ? `<img src="${e.avatar_url}" class="leaderboard-avatar">` : `<span class="text-xl w-11 h-11 flex items-center justify-center">${medalIcon}</span>`;
                    item.innerHTML = `
                        <div class="flex items-center gap-4">
                            ${avatarHTML}
                            <span class="font-cinzel text-lg">${i+1}. ${e.username}</span>
                        </div>
                        <span class="text-gold-accent font-bold text-xl">${e.score}</span>
                    `;
                    list.appendChild(item);
                });
            } else {
                list.innerHTML = '<div class="text-center py-10 opacity-50 font-cinzel">No scholars recorded yet in this era.</div>';
            }
        }

        // --- UTILS ---
        function shuffle(array) {
            let currentIndex = array.length, randomIndex;
            while (currentIndex != 0) {
                randomIndex = Math.floor(Math.random() * currentIndex);
                currentIndex--;
                [array[currentIndex], array[randomIndex]] = [array[randomIndex], array[currentIndex]];
            }
            return array;
        }

        function showScreen(id) {
            playSFX(sfx.click);
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
            const target = document.getElementById(id);
            if (target) target.classList.add('active-screen');
            toggleExitButton(id);
        }

        function toggleExitButton(screenId) {
            const btn = document.getElementById('exit-game-btn');
            if (!btn) return;
            const gameScreens = new Set(['quiz-screen', 'transition-screen', 'round-summary-screen', 'award-screen', 'end-screen']);
            btn.classList.toggle('hidden', !gameScreens.has(screenId));
        }

        function exitGame() {
            clearInterval(gameState.timerInterval);
            gameState.canAnswer = false;
            showScreen('start-screen');
        }

        function spawnConfetti() {
            for(let i=0; i<150; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                const colors = ['#D4AF37', '#fcf1d1', '#10b981', '#ffffff', '#34d399', '#6ee7b7'];
                const bgColor = colors[Math.floor(Math.random()*colors.length)];
                c.style.backgroundColor = bgColor;
                const duration = Math.random() * 3 + 3;
                c.style.animationDuration = duration + 's';
                c.style.animationDelay = Math.random() * 2 + 's';
                const size = Math.random() * 12 + 8 + 'px';
                c.style.width = size;
                c.style.height = size;
                c.style.borderRadius = '50%';
                c.style.boxShadow = `0 0 20px ${bgColor}`;
                c.style.opacity = Math.random() * 0.5 + 0.5;
                document.body.appendChild(c);
                setTimeout(() => c.remove(), (duration + 2) * 1000);
            }
        }

        const QUESTIONS_PER_ROUND = 5;

        function buildRoundSession(pool, time) {
            return {
                questions: shuffle([...pool]).slice(0, QUESTIONS_PER_ROUND),
                time
            };
        }

        function getPuzzleWordTokens(word) {
            return word.match(/_+|[^_]/g) || [];
        }

        function fillRound2Answer(word, answer, stateClass) {
            let answerIdx = 0;
            getPuzzleWordTokens(word).forEach((token, tokenIdx) => {
                if (!token.startsWith('_')) return;
                const el = document.getElementById(`bl-${tokenIdx}`);
                if (!el) return;
                el.innerText = answer[answerIdx] || "";
                if (stateClass) el.classList.add(stateClass);
                answerIdx++;
            });
        }

        // --- GAME ENGINE ---
        function initiateGame() {
            if (!isAuthReady) return; 
            playSFX(sfx.click);
            gameState.score = 0;
            gameState.gameQuestions = [
                buildRoundSession(round1Pool, 20),
                buildRoundSession(round2Pool, 25),
                buildRoundSession(round3Pool, 30),
                buildRoundSession(round4Pool, 15)
            ];
            
            document.getElementById('header-name').innerText = userProfile.name;
            if (userProfile.photo) {
                document.getElementById('header-avatar').src = userProfile.photo;
                document.getElementById('header-avatar').classList.remove('hidden');
                document.getElementById('current-user-tag').classList.remove('hidden');
            }
            startRound(1);
        }

        function startRound(num) {
            gameState.currentRound = num; gameState.currentQuestionIdx = 0;
            gameState.roundCorrect = 0; gameState.roundWrong = 0;
            document.getElementById('transition-round-name').innerText = ROUND_NAMES[num-1];
            document.getElementById('transition-round-num').innerText = `ROUND ${num}`;
            showScreen('transition-screen');
            setTimeout(() => { showScreen('quiz-screen'); loadQuestion(); }, 2500);
        }

        function startTimer(s) {
            clearInterval(gameState.timerInterval);
            let time = s;
            const bar = document.getElementById('timer-bar');
            bar.style.width = "100%";
            gameState.timerInterval = setInterval(() => {
                time--;
                bar.style.width = (time/s)*100 + "%";
                if (time <= 3) {
                    document.querySelector('.timer-bar-container').classList.add('timer-critical');
                    playSFX(sfx.tick);
                }
                if (time <= 0) { 
                    clearInterval(gameState.timerInterval); 
                    playSFX(sfx.timeout);
                    handleAnswer(-1); 
                }
            }, 1000);
        }

        function loadQuestion() {
            const rd = gameState.gameQuestions[gameState.currentRound-1];
            const q = rd.questions[gameState.currentQuestionIdx];
            gameState.canAnswer = true;
            document.querySelector('.timer-bar-container').classList.remove('timer-critical');
            document.getElementById('status-light').className = "status-light light-thinking";
            setupQuestion(q);
            startTimer(rd.time);
        }

        function setupQuestion(q) {
            const grid = document.getElementById('options-grid');
            const main = document.getElementById('question-main');
            const visual = document.getElementById('visual-element');
            grid.innerHTML = ''; visual.classList.add('hidden'); main.innerHTML = '';
            document.getElementById('question-count').innerText = `Question ${gameState.currentQuestionIdx + 1}/5`;
            document.getElementById('score-display').innerText = gameState.score.toString().padStart(4, '0');
            document.getElementById('round-indicator').innerText = ROUND_NAMES[gameState.currentRound-1];

            if (gameState.currentRound === 1 || gameState.currentRound === 4) {
                document.getElementById('question-prompt').innerText = (gameState.currentRound === 4) ? "Vision Quest" : "Knowledge Retrieval";
                main.innerText = q.q;
                main.className = "text-2xl md:text-3xl font-cinzel leading-relaxed min-h-[60px]";
                if (q.v) {
                    renderVisualSequence(visual, q.v);
                    visual.classList.remove('hidden');
                    visual.classList.add('flex', 'justify-center', 'items-center');
                }
                q.a.forEach((opt, i) => grid.appendChild(createBtn(opt, () => handleAnswer(i))));
            } else if (gameState.currentRound === 2) {
                document.getElementById('question-prompt').innerText = "Letter Puzzle";
                const scen = document.createElement('div'); scen.className = "text-xl mb-4 italic"; scen.innerText = q.q;
                main.appendChild(scen);
                const wc = document.createElement('div'); wc.className = "flex justify-center gap-2 text-4xl font-bold font-cinzel my-4";
                getPuzzleWordTokens(q.word).forEach((c, i) => {
                    const s = document.createElement('span');
                    if (c.startsWith('_')) { s.className = "letter-blank"; s.id = `bl-${i}`; } else s.innerText = c;
                    wc.appendChild(s);
                });
                main.appendChild(wc);
                generatePuzzleOpts(q.ans).forEach(o => grid.appendChild(createBtn(o, () => handleAnswer(o))));
            } else if (gameState.currentRound === 3) {
                document.getElementById('question-prompt').innerText = "Scramble Wisdom";
                gameState.typedAnswer = ""; gameState.scrambleHistory = [];
                const scen = document.createElement('div'); scen.className = "text-xl mb-6 italic"; scen.innerText = q.q;
                main.appendChild(scen);
                const sl = document.createElement('div'); sl.className = "flex justify-center gap-3 mb-10";
                for(let i=0; i<q.ans.length; i++) {
                    const s = document.createElement('div'); s.className = "scramble-slot"; s.id = `ss-${i}`; sl.appendChild(s);
                }
                main.appendChild(sl);
                const kb = document.createElement('div'); kb.className = "flex flex-wrap justify-center gap-3 max-w-lg mx-auto";
                shuffle(q.ans.split('').map((l, i) => ({l, i}))).forEach(it => {
                    const b = document.createElement('button'); b.className = "glass-card w-14 h-16 text-2xl font-bold text-gold-accent";
                    b.innerText = it.l; b.id = `k-${it.i}`; b.onclick = () => {
                        if (gameState.typedAnswer.length < q.ans.length && gameState.canAnswer) {
                            playSFX(sfx.click); b.disabled = true; b.style.opacity = "0.2";
                            document.getElementById(`ss-${gameState.typedAnswer.length}`).innerText = it.l;
                            document.getElementById(`ss-${gameState.typedAnswer.length}`).classList.add('filled');
                            gameState.scrambleHistory.push({l: it.l, id: b.id});
                            gameState.typedAnswer += it.l;
                            if (gameState.typedAnswer.length === q.ans.length) handleAnswer(gameState.typedAnswer);
                        }
                    };
                    kb.appendChild(b);
                });
                const cross = document.createElement('button'); cross.className = "glass-card w-14 h-16 text-red-400 text-2xl";
                cross.innerHTML = '<i class="fa-solid fa-times"></i>'; cross.onclick = () => {
                    if (gameState.scrambleHistory.length > 0) {
                        playSFX(sfx.click); const last = gameState.scrambleHistory.pop();
                        const btn = document.getElementById(last.id); btn.disabled = false; btn.style.opacity = "1";
                        const slot = document.getElementById(`ss-${gameState.typedAnswer.length - 1}`);
                        slot.innerText = ""; slot.classList.remove('filled');
                        gameState.typedAnswer = gameState.typedAnswer.slice(0, -1);
                    }
                };
                kb.appendChild(cross); grid.appendChild(kb);
            }
        }

        function createBtn(t, h) {
            const b = document.createElement('button');
            b.className = "glass-card p-5 hover:border-white/40 transition-all font-medium btn-option";
            b.innerText = t; b.onclick = h; return b;
        }

        function generatePuzzleOpts(cor) {
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const s = new Set([cor]);
            let attempts = 0;
            while(s.size < 4 && attempts < 100) {
                attempts++;
                let variant = cor.split('').map(c => ("AEIOU".includes(c) || Math.random() > 0.6) ? alphabet[Math.floor(Math.random()*26)] : c).join('');
                if (variant !== cor) s.add(variant);
            }
            return shuffle(Array.from(s));
        }

        function handleAnswer(sel) {
            if (!gameState.canAnswer) return;
            gameState.canAnswer = false; clearInterval(gameState.timerInterval);
            const q = gameState.gameQuestions[gameState.currentRound-1].questions[gameState.currentQuestionIdx];
            let isCorrect = (sel === q.c || sel === q.ans);

            const light = document.getElementById('status-light');
            light.className = isCorrect ? "status-light light-correct" : "status-light light-wrong";

            if (gameState.currentRound !== 3) {
                document.querySelectorAll('.btn-option').forEach((b, i) => {
                    if (gameState.currentRound === 2) {
                        if (b.innerText === q.ans) b.classList.add('correct-choice');
                        if (b.innerText === sel && !isCorrect) b.classList.add('wrong-choice');
                    } else {
                        if (i === q.c) b.classList.add('correct-choice');
                        if (i === sel && !isCorrect) b.classList.add('wrong-choice');
                    }
                });
            }

            if (isCorrect) { 
                playSFX(sfx.correct); gameState.score += 100 + (gameState.timeLeft * 10); gameState.roundCorrect++; 
                if (gameState.currentRound === 2) {
                    fillRound2Answer(q.word, q.ans, 'text-emerald-400');
                } else if (gameState.currentRound === 3) {
                    document.querySelectorAll('.scramble-slot').forEach(s => s.classList.add('text-emerald-400'));
                }
            } else {
                playSFX(sfx.wrong); gameState.roundWrong++;
                revealAnswer();
            }
            
            gameState.lastQ = q.q;
            gameState.lastA = (q.ans || q.a[q.c]);
            setTimeout(nextQuestion, 3500);
        }

        function revealAnswer() {
            const q = gameState.gameQuestions[gameState.currentRound-1].questions[gameState.currentQuestionIdx];
            if (gameState.currentRound === 2) {
                fillRound2Answer(q.word, q.ans, 'text-red-400');
            } else if (gameState.currentRound === 3) {
                q.ans.split('').forEach((c, i) => { const el = document.getElementById(`ss-${i}`); if(el) { el.innerText = c; el.classList.add('text-red-400'); }});
            }
        }

        function nextQuestion() {
            const rd = gameState.gameQuestions[gameState.currentRound-1];
            gameState.currentQuestionIdx++;
            if (gameState.currentQuestionIdx < rd.questions.length) loadQuestion(); else showRoundSummary();
        }

        function showRoundSummary() {
            document.getElementById('summary-correct').innerText = gameState.roundCorrect;
            document.getElementById('summary-wrong').innerText = gameState.roundWrong;
            const act = document.getElementById('summary-actions'); act.innerHTML = '';
            if (gameState.roundCorrect >= 3) {
                const btn = document.createElement('button'); btn.className = "btn-gold p-4 rounded-full w-full font-bold"; btn.innerText = "CLAIM MEDAL";
                btn.onclick = () => { playSFX(sfx.levelUp); showAward(); }; act.appendChild(btn);
            } else {
                const btn = document.createElement('button'); btn.className = "btn-gold p-4 rounded-full w-full font-bold"; btn.innerText = "RETRY ROUND";
                btn.onclick = () => startRound(gameState.currentRound); act.appendChild(btn);
            }
            showScreen('round-summary-screen');
        }

        function showAward() {
            const m = MEDALS[gameState.currentRound - 1];
            document.getElementById('medal-container').innerText = m.icon;
            document.getElementById('medal-name').innerText = m.name;
            showScreen('award-screen');
            spawnConfetti();
        }

        function proceedFromAward() {
            if (gameState.currentRound < 4) startRound(gameState.currentRound + 1); else endGame();
        }

        function endGame() {
            playSFX(sfx.victory);
            document.getElementById('final-score').innerText = gameState.score;
            document.getElementById('player-name-final').value = userProfile.name;
            showScreen('end-screen');
        }

        window.onload = async () => { 
            document.getElementById('begin-quest-btn').disabled = true;
            await handleAuth(); 
        };
    </script>
</body>
