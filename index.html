<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Islamic Scholar Quiz | The Journey</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* CSS Variables */
        :root {
            --emerald-deep: #022c22;
            --emerald-glow: #064e3b;
            --emerald-mint: #a7f3d0;
            --gold-accent: #D4AF37;
            --gold-bright: #fcf1d1;
        }

        /* Base Styles */
        body {
            font-family: 'Outfit', sans-serif;
            background: radial-gradient(circle at center, var(--emerald-glow) 0%, var(--emerald-deep) 100%);
            color: white;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 4rem 1.5rem 2rem;
        }

        .font-cinzel { font-family: 'Cinzel', serif; }

        /* Heading Gradient - Celestial White to Gold */
        .heading-gradient {
            background: linear-gradient(to bottom, #ffffff 0%, var(--gold-accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Premium Glassmorphism */
        .glass-step {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            border-radius: 28px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .glass-step:hover {
            background: rgba(212, 175, 55, 0.08);
            border-color: rgba(212, 175, 55, 0.4);
            transform: translateY(-10px);
        }

        /* Step Title vs Description Color */
        .step-title { color: var(--gold-accent); }
        .step-desc { color: var(--emerald-mint); opacity: 0.6; }

        /* The Grand Start Button - Centered at Bottom */
        .start-btn {
            background: linear-gradient(135deg, #D4AF37 0%, #b8860b 100%);
            color: var(--emerald-deep);
            padding: 1.25rem 7rem;
            border-radius: 9999px;
            font-weight: 900;
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            text-decoration: none;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            animation: pulse-glow 2.5s infinite;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .start-btn:active {
            transform: scale(0.95);
        }

        @keyframes pulse-glow {
            0%, 100% { transform: scale(1); box-shadow: 0 0 20px rgba(212, 175, 55, 0.3); }
            50% { transform: scale(1.05); box-shadow: 0 0 60px rgba(212, 175, 55, 0.6); }
        }

        /* Fade-in Animations */
        .fade-in {
            animation: fadeIn 1s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .delay-1 { animation-delay: 0.3s; }
        .delay-2 { animation-delay: 0.6s; }
    </style>
</head>
<body>

    <!-- TOP SECTION: HEADER -->
    <header class="text-center fade-in">
        <div class="mb-4">
            <i class="fa-solid fa-mosque text-5xl md:text-6xl text-[#D4AF37] filter drop-shadow-md"></i>
        </div>
        <h1 class="font-cinzel text-5xl md:text-8xl font-bold tracking-[0.2em] heading-gradient mb-2">
            ISLAMIC SCHOLAR
        </h1>
        <p class="text-xs md:text-lg tracking-[0.5em] uppercase font-bold text-[#D4AF37]/80">
            The Ultimate Knowledge Quest
        </p>
    </header>

    <!-- MIDDLE SECTION: STEPS -->
    <main class="grid grid-cols-1 md:grid-cols-3 gap-6 md:gap-10 max-w-6xl w-full fade-in delay-1 px-4">
        
        <!-- STEP 1 -->
        <div class="glass-step p-8 md:p-10 text-center">
            <div class="w-12 h-12 flex items-center justify-center mx-auto mb-5 rounded-full bg-white/5 border border-white/10">
                <i class="fa-solid fa-user-pen text-white text-xl"></i>
            </div>
            <h2 class="font-cinzel text-xl md:text-2xl tracking-widest step-title mb-3">1. Create Profile</h2>
            <p class="step-desc text-[11px] uppercase tracking-widest font-semibold leading-relaxed">Identity synced to the eternal cloud</p>
        </div>

        <!-- STEP 2 -->
        <div class="glass-step p-8 md:p-10 text-center">
            <div class="w-12 h-12 flex items-center justify-center mx-auto mb-5 rounded-full bg-white/5 border border-white/10">
                <i class="fa-solid fa-scroll text-white text-xl"></i>
            </div>
            <h2 class="font-cinzel text-xl md:text-2xl tracking-widest step-title mb-3">2. Face Trials</h2>
            <p class="step-desc text-[11px] uppercase tracking-widest font-semibold leading-relaxed">Test wisdom across four distinct circles</p>
        </div>

        <!-- STEP 3 -->
        <div class="glass-step p-8 md:p-10 text-center">
            <div class="w-12 h-12 flex items-center justify-center mx-auto mb-5 rounded-full bg-white/5 border border-white/10">
                <i class="fa-solid fa-trophy text-white text-xl"></i>
            </div>
            <h2 class="font-cinzel text-xl md:text-2xl tracking-widest step-title mb-3">3. Join the Hall</h2>
            <p class="step-desc text-[11px] uppercase tracking-widest font-semibold leading-relaxed">Secure your rank among global scholars</p>
        </div>

    </main>

    <!-- BOTTOM SECTION: ACTION -->
    <footer class="fade-in delay-2 text-center w-full mb-8">
        <div class="mb-10">
            <a href="game.html" class="start-btn">
                Start
            </a>
        </div>
        <div class="text-[10px] uppercase tracking-[0.6em] text-white/20 font-bold">
            Seek Knowledge From Cradle to Grave
        </div>
    </footer>

</body>
</html>
